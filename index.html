<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Iraqi Economic Forum</title>
<style>
body {font-family: Arial; background:#07140C; color:white; margin:0;}
header {padding:40px; text-align:center; background:#0B5D2A;}
h1 {color:#D4B06A;}
.section {padding:40px;}
button {background:#D4B06A; border:none; padding:10px 20px; font-weight:bold;}
input, textarea {width:100%; padding:10px; margin-top:10px;}
</style>
</head>

<body>

<header>
<h1>التجمع الاقتصادي العراقي</h1>
<p>Iraqi Economic Forum</p>
</header>

<div class="section">
<h2>من نحن</h2>
<p>منصة اقتصادية عراقية تجمع الخبراء وصناع القرار لبناء مستقبل اقتصادي قوي.</p>
</div>

<div class="section">
<h2>التسجيل في العضوية</h2>
<form action="https://formspree.io/f/your-id" method="POST">
<input type="text" name="name" placeholder="الاسم الكامل" required>
<input type="email" name="email" placeholder="البريد الإلكتروني" required>
<textarea name="message" placeholder="سبب الانضمام"></textarea>
<button type="submit">إرسال</button>
</form>
</div>

</body>
</html>
